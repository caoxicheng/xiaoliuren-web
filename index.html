<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="小六壬算卦工具 - 传统占卜，掐指一算">
    <meta name="keywords" content="小六壬,算卦,占卜,六壬">
    <title>小六壬算卦 - 掐指一算</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="header">
        <div class="container">
            <h1>小六壬算卦</h1>
            <p class="subtitle">掐指一算，知晓吉凶</p>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 事项选择区 -->
        <section class="matter-section">
            <label for="matter-select" class="matter-label">我想问：</label>
            <select id="matter-select" class="matter-select">
                <option value="">-- 请选择事项类型 --</option>
                <option value="求财">求财</option>
                <option value="出行">出行</option>
                <option value="婚姻感情">婚姻感情</option>
                <option value="疾病健康">疾病健康</option>
                <option value="失物寻找">失物寻找</option>
                <option value="诉讼官司">诉讼官司</option>
                <option value="考试学业">考试学业</option>
                <option value="事业工作">事业工作</option>
                <option value="综合">综合（所有事项）</option>
            </select>
        </section>

        <!-- 起卦按钮区 -->
        <section class="divination-section">
            <button id="divination-btn" class="divination-btn">
                立即起卦
            </button>
        </section>

        <!-- 卦象结果展示区 -->
        <section id="result-section" class="result-section hidden">
            <!-- 起卦时间 -->
            <div class="card">
                <h2 class="card-title">起卦时间</h2>
                <div class="time-info">
                    <p><strong>公历：</strong><span id="solar-date"></span></p>
                    <p><strong>农历：</strong><span id="lunar-date"></span></p>
                </div>
            </div>

            <!-- 卦象结果 -->
            <div class="card">
                <h2 class="card-title">卦象结果</h2>
                <div id="gua-result" class="gua-result">
                    <!-- 动态生成卦象内容 -->
                </div>
            </div>

            <!-- AI 解读区 -->
            <div class="card" id="ai-section" style="display:none;">
                <h2 class="card-title">AI 深度解读</h2>
                <div id="ai-loading" class="ai-loading" style="display:none;">
                    <div class="ai-spinner"></div>
                    <span>AI 解读中...</span>
                </div>
                <div id="ai-result" class="ai-result"></div>
                <div id="ai-error" class="ai-error" style="display:none;"></div>
            </div>

            <!-- 综合解读 -->
            <div class="card">
                <h2 class="card-title">综合解读</h2>
                <div id="analysis" class="analysis-text"></div>
            </div>

            <!-- 吉凶判断 -->
            <div class="card">
                <h2 class="card-title">吉凶判断</h2>
                <div id="jixiong" class="jixiong-container"></div>
            </div>

            <!-- 建议 -->
            <div class="card">
                <h2 class="card-title">建议</h2>
                <div id="advice" class="advice-text"></div>
            </div>
        </section>

        <!-- 历史记录区 -->
        <section class="history-section">
            <button id="history-toggle-btn" class="history-toggle-btn">
                查看历史记录
            </button>
            <div id="history-list" class="history-list hidden">
                <!-- 动态生成历史记录 -->
            </div>
        </section>
    </main>

    <!-- 页面底部 -->
    <footer class="footer">
        <p>&copy; 2026 小六壬算卦工具 | 仅供娱乐参考</p>
    </footer>

    <!-- 引入农历转换库 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>

    <!-- 引入自定义脚本 -->
    <script src="js/data.js"></script>
    <script src="js/xiaoliuren-core.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
